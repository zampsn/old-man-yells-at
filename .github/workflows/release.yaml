name: Release
run-name: ${{ github.ref == 'refs/heads/main' && 'Release (publish)' || 'Release (dry-run)' }}

on:
  push:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - name: Verify signatures
        run: npm audit signatures

      - name: Build
        run: npm run build

      - name: Release (publish)
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Release (dry-run)
        if: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:dry-run -- --branches "${{ github.ref_name }}"
